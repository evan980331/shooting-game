<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Map Editor v9.7</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1200px; width: 100%; }
        .sidebar { flex: 0 0 300px; background: #2a2a2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .main-view { flex: 1; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #444; background: #000; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        h2 { margin-top: 0; color: #00ffaa; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 0.9em; text-transform: uppercase; color: #888; margin-bottom: 8px; font-weight: bold; }
        
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .control-group { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        
        input[type="number"], input[type="text"], select { 
            background: #111; color: #eee; border: 1px solid #555; padding: 5px; border-radius: 4px; width: 80px;
        }
        select { width: 100%; padding: 8px; font-size: 1em; }
        
        button { 
            background: #3a3a3a; color: #fff; border: 1px solid #555; padding: 10px; cursor: pointer; border-radius: 6px; 
            transition: all 0.2s; font-weight: bold;
        }
        button:hover { background: #4a4a4a; border-color: #777; }
        button.primary { background: #0066cc; border-color: #0088ff; }
        button.primary:hover { background: #0088ff; }
        button.danger { background: #662222; border-color: #aa4444; }
        button.danger:hover { background: #883333; }
        
        .stats { font-size: 0.85em; color: #aaa; margin-top: 10px; background: #222; padding: 10px; border-radius: 6px; }
        textarea { 
            width: 100%; height: 120px; background: #050505; color: #0f0; border: 1px solid #333; 
            font-family: 'Consolas', monospace; padding: 10px; border-radius: 6px; margin-top: 10px; resize: none;
            font-size: 11px;
        }
        
        .toolbar { margin-bottom: 15px; display: flex; gap: 15px; background: #2a2a2a; padding: 10px 20px; border-radius: 10px; width: 800px; }
        .coord-display { font-family: monospace; color: #ffdd00; font-weight: bold; min-width: 120px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="coord-display" id="cursor-pos">POS: 0, 0</div>
        <div class="control-group">
            <label>縮放 (Zoom):</label>
            <input type="range" id="zoom-range" min="0.5" max="4.0" step="0.1" value="1.0" oninput="updateZoom()">
            <span id="zoom-val">1.0x</span>
        </div>
        <div class="control-group">
            <label><input type="checkbox" id="show-grid" checked onchange="draw()"> 顯示格線</label>
            <label><input type="checkbox" id="snap-grid" checked> 對齊網格</label>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h2>地圖物件設定</h2>
            
            <div class="section">
                <div class="section-title">放置模式</div>
                <select id="mode" onchange="updateUI()">
                    <option value="wall">🧱 牆壁 (Obstacle)</option>
                    <option value="grass">🌿 草叢 (Bush)</option>
                    <option value="safe">🔒 保險櫃 (Safe)</option>
                    <option value="loot">📦 物資點 (Loot)</option>
                    <option value="building">🏢 建築物標點 (Bldg)</option>
                    <option value="exit">🚪 撤離點 (Exit)</option>
                    <option value="spawn">🧍 生成點 (Spawn)</option>
                    <option value="delete">❌ 刪除物件</option>
                </select>
            </div>

            <div id="size-inputs" class="section">
                <div class="section-title">物件尺寸</div>
                <div class="control-group">
                    <label>寬 (W):</label>
                    <input type="number" id="obj-w" value="400" step="10">
                </div>
                <div class="control-group" style="margin-top:5px;">
                    <label>高 (H):</label>
                    <input type="number" id="obj-h" value="40" step="10">
                </div>
            </div>

            <div id="name-inputs" class="section" style="display:none;">
                <div class="section-title">物件名稱</div>
                <input type="text" id="obj-name" value="DEFAULT" style="width: 100%;">
            </div>

            <div class="section" style="display: flex; flex-direction: column; gap: 8px;">
                <button class="primary" onclick="exportData()">💾 匯出並複製代碼</button>
                <button onclick="undo()">↩️ 復原 (Ctrl+Z)</button>
                <button onclick="resetToDefault()">🔄 重置為預設地圖</button>
                <button class="danger" onclick="clearMap()">🗑️ 清除全部物件</button>
            </div>

            <div class="section">
                <div class="section-title">本機/雲端存檔</div>
                <input type="text" id="save-name" placeholder="輸入版本名稱..." style="width: 100%; margin-bottom: 8px;">
                <div style="display:flex; gap: 8px;">
                    <button onclick="saveMap()" style="flex:1; background: #2a8a2a; border-color: #3b9b3b;">📥 儲存</button>
                    <button onclick="loadMap()" style="flex:1; background: #8a6a2a; border-color: #9b7b3b;">📤 讀取</button>
                </div>
                <div style="margin-top: 15px; font-size: 0.9em; color: #ccc;">
                    <div style="margin-bottom: 5px; font-weight: bold;">歷屆存檔版本：</div>
                    <ul id="save-history-list" style="list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; border-top: 1px dashed #555; padding-top: 8px;">
                        <!-- Save list populated here -->
                    </ul>
                </div>
            </div>

            <div class="stats" id="stats-panel">
                物件統計:<br>
                牆壁: 0, 草叢: 0, 物資: 0
            </div>
            
            <textarea id="output" readonly></textarea>
        </div>

        <div class="main-view">
            <div id="canvas-container" style="overflow: auto; width: 800px; height: 800px; border: 1px solid #444; background: #000;">
                <canvas id="editor" width="8000" height="8000" style="width: 800px; height: 800px;"></canvas>
            </div>
            <p style="color: #666; font-size: 0.8em; margin-top: 10px;">
                使用滾輪縮放 | 點擊放置物件 | 牆壁與撤離點座標採中心點計算法
            </p>
        </div>
    </div>

    <script>
        // ======== Supabase Config ========
        const SUPABASE_URL = 'https://dntaqhzsbswfnwtbfgbv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRudGFxaHpzYnN3Zm53dGJmZ2J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NzIxODUsImV4cCI6MjA5NDM0ODE4NX0.7bFRfqvobwdDA3zyGanJfmfCqkka-G8p5Z-o08CluYs';

        async function sbRequest(method, path, body = null) {
            const opts = {
                method,
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=representation' : 'return=representation'
                }
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
            const text = await res.text();
            if (!res.ok) throw new Error(text);
            return text ? JSON.parse(text) : null;
        }
        // =================================

        const canvas = document.getElementById('editor');
        const ctx = canvas.getContext('2d');
        const MAP_SIZE = 8000;
        
        let walls = [];
        let spawns = [];
        let exits = [];
        let grass = [];
        let safes = [];
        let loots = [];
        let buildings = [];

        let currentWorldX = 0;
        let currentWorldY = 0;
        let zoom = 1.0;
        let isHovering = false;
        
        let historyStack = [];
        let isMouseDown = false;
        let lastPlaced = { x: -9999, y: -9999 };

        function saveState() {
            historyStack.push({
                walls: JSON.parse(JSON.stringify(walls)),
                spawns: JSON.parse(JSON.stringify(spawns)),
                exits: JSON.parse(JSON.stringify(exits)),
                grass: JSON.parse(JSON.stringify(grass)),
                safes: JSON.parse(JSON.stringify(safes)),
                loots: JSON.parse(JSON.stringify(loots)),
                buildings: JSON.parse(JSON.stringify(buildings))
            });
            if (historyStack.length > 50) historyStack.shift();
        }

        window.undo = () => {
            if (historyStack.length > 0) {
                let state = historyStack.pop();
                walls = state.walls;
                spawns = state.spawns;
                exits = state.exits;
                grass = state.grass;
                safes = state.safes;
                loots = state.loots;
                buildings = state.buildings;
                draw();
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                window.undo();
            }
        });

        function updateZoom() {
            zoom = parseFloat(document.getElementById('zoom-range').value);
            document.getElementById('zoom-val').innerText = zoom.toFixed(1) + 'x';
            canvas.style.width = (800 * zoom) + 'px';
            canvas.style.height = (800 * zoom) + 'px';
        }

        function updateUI() {
            const mode = document.getElementById('mode').value;
            const sizeIn = document.getElementById('size-inputs');
            const nameIn = document.getElementById('name-inputs');
            
            sizeIn.style.display = (['wall', 'exit', 'grass', 'building', 'loot'].includes(mode) ? 'block' : 'none');
            nameIn.style.display = (['exit', 'spawn', 'building', 'loot', 'safe'].includes(mode) ? 'block' : 'none');

            if (mode === 'grass') {
                document.getElementById('obj-w').value = 60;
                document.getElementById('obj-h').value = 60;
            } else if (mode === 'safe') {
                document.getElementById('obj-w').value = 40;
                document.getElementById('obj-h').value = 40;
                document.getElementById('obj-name').value = 'SAFE_' + safes.length;
            } else if (mode === 'exit') {
                document.getElementById('obj-w').value = 600;
                document.getElementById('obj-h').value = 600;
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines (player-sized 30x30 squares for alignment reference)
            if (document.getElementById('show-grid').checked) {
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1;
                // Major lines (1000)
                for(let i=0; i<=MAP_SIZE; i+=1000) {
                    ctx.strokeStyle = '#444';
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
                }
                // Minor lines (Player size 30) - only visible at high zoom for performance if needed
                if (zoom > 1.5) {
                    ctx.strokeStyle = '#1a1a1a';
                    for(let i=0; i<=MAP_SIZE; i+=30) {
                        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
                    }
                }
            }

            // Draw boundaries
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, MAP_SIZE, MAP_SIZE);

            // Draw Buildings (background level)
            ctx.fillStyle = 'rgba(80, 80, 100, 0.5)';
            for(let b of buildings) {
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
                ctx.strokeStyle = '#88f'; ctx.lineWidth = 2;
                ctx.strokeRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
            }

            // Draw Grass
            ctx.fillStyle = 'rgba(40, 150, 40, 0.6)';
            for(let g of grass) {
                ctx.beginPath(); ctx.arc(g.x, g.y, (g.w+g.h)/4, 0, Math.PI*2); ctx.fill();
            }

            // Draw Walls
            ctx.fillStyle = 'rgba(120, 120, 120, 1)';
            for(let w of walls) ctx.fillRect(w.x - w.w/2, w.y - w.h/2, w.w, w.h);

            // Draw Exits
            ctx.fillStyle = 'rgba(0, 255, 100, 0.3)';
            ctx.strokeStyle = '#0f0';
            for(let e of exits) {
                ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
                ctx.strokeRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
                ctx.fillStyle = 'white'; ctx.font = '80px sans-serif';
                ctx.fillText(e.name, e.x - e.w/2 + 20, e.y - e.h/2 + 100);
            }

            // Draw Loots
            ctx.fillStyle = '#ffaa00';
            for(let l of loots) {
                ctx.fillRect(l.x - l.w/2, l.y - l.h/2, l.w, l.h);
                ctx.fillStyle = 'white'; ctx.font = '30px sans-serif';
                ctx.fillText(l.name || 'LOOT', l.x, l.y);
            }

            // Draw Safes
            ctx.fillStyle = '#00ffff';
            for(let s of safes) {
                ctx.fillRect(s.x - 20, s.y - 20, 40, 40);
                ctx.strokeStyle = 'white'; ctx.strokeRect(s.x - 20, s.y - 20, 40, 40);
            }

            // Draw Spawns
            ctx.fillStyle = '#3399ff';
            for(let s of spawns) {
                ctx.beginPath(); ctx.arc(s.x, s.y, 30, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = '40px sans-serif';
                ctx.fillText(s.name, s.x + 40, s.y);
            }

            // Draw Preview
            if (isHovering) {
                const mode = document.getElementById('mode').value;
                const snap = document.getElementById('snap-grid').checked;
                let mx = currentWorldX;
                let my = currentWorldY;
                if (snap) {
                    mx = Math.round(mx / 30) * 30; // Snap to player size
                    my = Math.round(my / 30) * 30;
                }

                if (mode === 'wall' || mode === 'exit' || mode === 'grass' || mode === 'building' || mode === 'loot') {
                    const w = parseInt(document.getElementById('obj-w').value) || 100;
                    const h = parseInt(document.getElementById('obj-h').value) || 100;
                    ctx.fillStyle = mode === 'wall' ? 'rgba(255,255,255,0.4)' : (mode === 'exit' ? 'rgba(0,255,0,0.4)' : 'rgba(255,255,0,0.4)');
                    ctx.fillRect(mx - w/2, my - h/2, w, h);
                } else if (mode === 'spawn' || mode === 'safe') {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath(); ctx.arc(mx, my, 20, 0, Math.PI*2); ctx.fill();
                } else if (mode === 'delete') {
                    ctx.strokeStyle = 'red'; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.arc(mx, my, 50, 0, Math.PI*2); ctx.stroke();
                }
            }

            updateStats();
        }

        canvas.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            // Map mouse client coords to world coords (0-8000)
            const xRel = (e.clientX - rect.left) / rect.width;
            const yRel = (e.clientY - rect.top) / rect.height;
            currentWorldX = xRel * MAP_SIZE;
            currentWorldY = yRel * MAP_SIZE;
            
            document.getElementById('cursor-pos').innerText = `POS: ${Math.round(currentWorldX)}, ${Math.round(currentWorldY)}`;
            isHovering = true;
            
            if (isMouseDown) {
                const mode = document.getElementById('mode').value;
                const w = parseInt(document.getElementById('obj-w').value) || 100;
                const h = parseInt(document.getElementById('obj-h').value) || 100;
                // Deleting should trigger rapidly, others should have spacing
                const spacing = mode === 'delete' ? 20 : Math.max(20, Math.min(w, h));
                
                if (Math.hypot(currentWorldX - lastPlaced.x, currentWorldY - lastPlaced.y) >= spacing) {
                    placeObject();
                }
            }
            draw();
        };

        canvas.onmouseout = () => { isHovering = false; draw(); };
        
        canvas.onmousedown = (e) => {
            if (e.button !== 0) return; // Only left click
            isMouseDown = true;
            saveState();
            placeObject();
        };

        canvas.onmouseup = () => {
            isMouseDown = false;
            lastPlaced = { x: -9999, y: -9999 };
        };

        function placeObject() {
            const mode = document.getElementById('mode').value;
            const snap = document.getElementById('snap-grid').checked;
            
            let mx = currentWorldX;
            let my = currentWorldY;
            if (snap) {
                mx = Math.round(mx / 30) * 30;
                my = Math.round(my / 30) * 30;
            }

            const w = parseInt(document.getElementById('obj-w').value) || 100;
            const h = parseInt(document.getElementById('obj-h').value) || 100;
            const name = document.getElementById('obj-name').value;

            if (mode === 'wall') {
                walls.push({x: mx, y: my, w: w, h: h, color:[0.5,0.5,0.5,1]});
            } else if (mode === 'grass') {
                grass.push({x: mx, y: my, w: w, h: h});
            } else if (mode === 'safe') {
                safes.push({x: mx, y: my});
            } else if (mode === 'loot') {
                loots.push({x: mx, y: my, w: w, h: h, name: name});
            } else if (mode === 'building') {
                buildings.push({x: mx, y: my, w: w, h: h, name: name});
            } else if (mode === 'exit') {
                exits.push({x: mx, y: my, w: w, h: h, name: name});
            } else if (mode === 'spawn') {
                spawns.push({x: mx, y: my, name: name});
            } else if (mode === 'delete') {
                const dist = (ax, ay, bx, by) => Math.hypot(ax-bx, ay-by);
                walls = walls.filter(o => dist(mx, my, o.x, o.y) > 50);
                grass = grass.filter(o => dist(mx, my, o.x, o.y) > 50);
                safes = safes.filter(o => dist(mx, my, o.x, o.y) > 50);
                loots = loots.filter(o => dist(mx, my, o.x, o.y) > 50);
                buildings = buildings.filter(o => dist(mx, my, o.x, o.y) > 100);
                exits = exits.filter(o => dist(mx, my, o.x, o.y) > 100);
                spawns = spawns.filter(o => dist(mx, my, o.x, o.y) > 50);
            }
            lastPlaced = { x: currentWorldX, y: currentWorldY };
            draw();
        }

        function updateStats() {
            const stats = `牆壁: ${walls.length} | 草叢: ${grass.length} | 出口: ${exits.length} | 生成: ${spawns.length} | 建物: ${buildings.length}`;
            document.getElementById('stats-panel').innerText = stats;
        }

        window.resetToDefault = () => {
            walls = [
                { x: 4000, y: -20, w: 8040, h: 40, color: [0.3, 0.3, 0.3, 1] },
                { x: 4000, y: 8020, w: 8040, h: 40, color: [0.3, 0.3, 0.3, 1] },
                { x: -20, y: 4000, w: 40, h: 8040, color: [0.3, 0.3, 0.3, 1] },
                { x: 8020, y: 4000, w: 40, h: 8040, color: [0.3, 0.3, 0.3, 1] },
                { x: 2000, y: 2000, w: 1200, h: 80, color: [0.5, 0.5, 0.5, 1] },
                { x: 6000, y: 2000, w: 1200, h: 80, color: [0.5, 0.5, 0.5, 1] },
                { x: 2000, y: 6000, w: 1200, h: 80, color: [0.5, 0.5, 0.5, 1] },
                { x: 6000, y: 6000, w: 1200, h: 80, color: [0.5, 0.5, 0.5, 1] },
                { x: 4000, y: 3000, w: 80, h: 1600, color: [0.4, 0.4, 0.4, 1] },
                { x: 4000, y: 5000, w: 80, h: 1600, color: [0.4, 0.4, 0.4, 1] },
                { x: 3000, y: 4000, w: 1600, h: 80, color: [0.4, 0.4, 0.4, 1] },
                { x: 5000, y: 4000, w: 1600, h: 80, color: [0.4, 0.4, 0.4, 1] },
                { x: 1000, y: 4000, w: 80, h: 2000, color: [0.5, 0.5, 0.5, 1] },
                { x: 7000, y: 4000, w: 80, h: 2000, color: [0.5, 0.5, 0.5, 1] },
                { x: 4000, y: 1000, w: 2000, h: 80, color: [0.5, 0.5, 0.5, 1] },
                { x: 4000, y: 7000, w: 2000, h: 80, color: [0.5, 0.5, 0.5, 1] }
            ];
            spawns = [
                { x: 800, y: 800, name: 'TL' },
                { x: 7200, y: 800, name: 'TR' },
                { x: 800, y: 7200, name: 'BL' },
                { x: 7200, y: 7200, name: 'BR' },
                { x: 4000, y: 4000, name: 'C' }
            ];
            exits = [
                { x: 600, y: 600, w: 600, h: 600, color: [0, 1, 0.5, 0.3], name: 'TL_EXIT' },
                { x: 7400, y: 600, w: 600, h: 600, color: [0, 1, 0.5, 0.3], name: 'TR_EXIT' },
                { x: 600, y: 7400, w: 600, h: 600, color: [0, 1, 0.5, 0.3], name: 'BL_EXIT' },
                { x: 7400, y: 7400, w: 600, h: 600, color: [0, 1, 0.5, 0.3], name: 'BR_EXIT' }
            ];
            grass = []; safes = []; loots = []; buildings = [];
            draw();
        };

        window.exportData = () => {
            let out = `        // --- MAP DATA START ---\n`;
            out += `        this.walls = [\n            ${walls.map(o => `{ x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h}, color: [0.5, 0.5, 0.5, 1] }`).join(',\n            ')}\n        ];\n\n`;
            out += `        this.state.grass = [\n            ${grass.map(o => `{ x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h}, type: 'bush' }`).join(',\n            ')}\n        ];\n\n`;
            out += `        this.spawnPoints = [\n            ${spawns.map(o => `{ x: ${o.x}, y: ${o.y}, name: '${o.name}' }`).join(',\n            ')}\n        ];\n\n`;
            out += `        this.extractionZones = [\n            ${exits.map(o => `{ x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h}, color: [0, 1, 0.5, 0.3], name: '${o.name}' }`).join(',\n            ')}\n        ];\n\n`;
            out += `        this.safes = [\n            ${safes.map(o => `{ x: ${o.x}, y: ${o.y} }`).join(',\n            ')}\n        ];\n\n`;
            out += `        this.lootPoints = [\n            ${loots.map(o => `{ x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h}, name: '${o.name}' }`).join(',\n            ')}\n        ];\n\n`;
            out += `        this.buildings = [\n            ${buildings.map(o => `{ x: ${o.x}, y: ${o.y}, w: ${o.w}, h: ${o.h}, name: '${o.name}' }`).join(',\n            ')}\n        ];\n`;
            out += `        // --- MAP DATA END ---`;
            
            document.getElementById('output').value = out;
            document.getElementById('output').select();
            document.execCommand('copy');
            alert('地圖代碼已生成並複製到剪貼簿！');
        };

        window.clearMap = () => { 
            saveState();
            walls=[]; spawns=[]; exits=[]; grass=[]; safes=[]; loots=[]; buildings=[]; draw(); 
        };

        window.saveMap = async () => {
            const name = document.getElementById('save-name').value.trim();
            if (!name) { alert('請輸入版本名稱！'); return; }
            const state = { walls, spawns, exits, grass, safes, loots, buildings };
            try {
                await sbRequest('POST', 'map_saves?on_conflict=name', { name, data: state });
                alert('✅ 已儲存至雲端: ' + name);
                updateSaveHistory();
            } catch(e) {
                console.error(e);
                alert('❌ 雲端儲存失敗: ' + e.message);
            }
        };

        window.loadMap = async () => {
            const name = document.getElementById('save-name').value.trim();
            if (!name) { alert('請輸入要讀取的版本名稱！'); return; }
            try {
                const rows = await sbRequest('GET', `map_saves?name=eq.${encodeURIComponent(name)}&select=data`);
                if (!rows || rows.length === 0) { alert('❌ 找不到存檔: ' + name); return; }
                saveState();
                const s = rows[0].data;
                walls = s.walls || [];
                spawns = s.spawns || [];
                exits = s.exits || [];
                grass = s.grass || [];
                safes = s.safes || [];
                loots = s.loots || [];
                buildings = s.buildings || [];
                draw();
                alert('✅ 已從雲端讀取: ' + name);
            } catch(e) {
                console.error(e);
                alert('❌ 讀取失敗: ' + e.message);
            }
        };

        async function updateSaveHistory() {
            const list = document.getElementById('save-history-list');
            if (!list) return;
            list.innerHTML = '<li style="color:#888; text-align:center">載入中...</li>';
            
            let saves = [];
            try {
                saves = await sbRequest('GET', 'map_saves?select=name,created_at&order=created_at.desc');
            } catch(e) {
                list.innerHTML = `<li style="color:#f44; font-size:0.85em">❌ 無法連接雲端: ${e.message}</li>`;
                return;
            }
            
            if (!saves || saves.length === 0) {
                list.innerHTML = '<li style="color: #666; font-style: italic; text-align: center;">無存檔紀錄</li>';
                return;
            }

            list.innerHTML = '';
            saves.forEach(row => {
                const name = row.name;
                const date = row.created_at ? new Date(row.created_at).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';

                const li = document.createElement('li');
                li.style.cssText = 'display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #333;';

                const left = document.createElement('div');
                left.style.flex = '1';

                const nameSpan = document.createElement('span');
                nameSpan.innerText = name;
                nameSpan.style.cssText = 'cursor:pointer; color:#4da6ff; font-weight:bold; display:block;';
                nameSpan.title = '點擊載入此版本';
                nameSpan.onclick = () => {
                    document.getElementById('save-name').value = name;
                    window.loadMap();
                };

                const dateSpan = document.createElement('span');
                dateSpan.innerText = date;
                dateSpan.style.cssText = 'font-size:0.75em; color:#777;';

                left.appendChild(nameSpan);
                left.appendChild(dateSpan);

                const delBtn = document.createElement('button');
                delBtn.innerText = '刪除';
                delBtn.style.cssText = 'padding:2px 6px; background:#8a2a2a; border:1px solid #aa3a3a; color:#fff; cursor:pointer; font-size:0.7em; border-radius:3px; margin-left:6px;';
                delBtn.onclick = async () => {
                    if (confirm(`確定要刪除雲端存檔 [${name}] 嗎？`)) {
                        try {
                            await sbRequest('DELETE', `map_saves?name=eq.${encodeURIComponent(name)}`);
                            updateSaveHistory();
                        } catch(e) {
                            alert('❌ 刪除失敗: ' + e.message);
                        }
                    }
                };

                li.appendChild(left);
                li.appendChild(delBtn);
                list.appendChild(li);
            });
        }

        // Initialize
        updateZoom();
        updateUI();
        updateSaveHistory();
        resetToDefault();
    </script>
</body>
</html>
